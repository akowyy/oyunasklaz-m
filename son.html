<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadece İkimiz</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #2d2d2d; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        #story { font-size: 20px; margin-bottom: 20px; line-height: 1.5; }
        button { background: #e91e63; color: white; border: none; padding: 15px 30px; margin: 10px; border-radius: 25px; font-size: 18px; cursor: pointer; width: 100%; max-width: 300px; }
    </style>
</head>
<body>
    <div id="story">İzmir'de güneşli bir gün... Nereden başlamak istersin?</div>
    <div id="choices"></div>

    <script>
        const storyData = {
            start: { text: "İzmir'de güzel bir gün, nereye gitmek istersin?", choices: [ { text: "Kordon'da yürüyüş", next: "kordon" }, { text: "Bizim ilk buluştuğumuz yer", next: "ilk_bulusma" } ] },
            kordon: { text: "Deniz kokusu harika! Bir dondurma mı alalım yoksa çay mı içelim?", choices: [ { text: "Dondurma", next: "dondurma" }, { text: "Çay", next: "cay" } ] },
            ilk_bulusma: { text: "O günü hatırlıyor musun? Gözlerinin içine baktığım o an...", choices: [ { text: "Tabii ki hatırlıyorum!", next: "son" } ] },
            son: { text: "Seni seviyorum, hayatımdaki en güzel anlar seninle olanlar. ❤️", choices: [] }
        };

        function showScene(scene) {
            const storyDiv = document.getElementById('story');
            const choicesDiv = document.getElementById('choices');
            storyDiv.innerText = storyData[scene].text;
            choicesDiv.innerHTML = '';
            storyData[scene].choices.forEach(c => {
                const btn = document.createElement('button');
                btn.innerText = c.text;
                btn.onclick = () => showScene(c.next);
                choicesDiv.appendChild(btn);
            });
        }
        showScene('start');
    </script>
</body>
</html>
